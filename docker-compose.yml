services:
  web:
    build: .
    image: movie-search-app:latest
    container_name: movie-search-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      # Pass through from the shell or from a local .env file
      - TMDB_API_KEY=${TMDB_API_KEY}
    restart: unless-stopped
